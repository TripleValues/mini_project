services:

  web-main:
    image: nginx:1.28
    container_name: web-main
    ports:
      - 80:80
    volumes:
      - ./config:/etc/nginx/conf.d:ro
      - ./main:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    networks:
      - spark-network

  frontend:
    image: nginx:1.28
    container_name: frontend
    volumes:
      - ./frontend/config:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - spark-network

  backend:
    image: uv:backend
    container_name: backend
    volumes:
      - ./backend/pyproject.toml:/workspace/pyproject.toml
      - ./backend/uv.lock:/workspace/uv.lock
      - ./backend/.python-version:/workspace/.python-version
      - ./backend/main.py:/workspace/main.py
      - ./backend/settings.py:/workspace/settings.py
      - ./backend/pages:/workspace/pages
      - ./backend/data:/workspace/data
      - ./backend/mariadb-java-client-3.5.7.jar:/workspace/mariadb-java-client-3.5.7.jar
    environment:
      - API_KEY=4b7551556b6e6172393456434e4174
      - MARIADB_HOST=mariadb
      - MARIADB_USER=root
      - MARIADB_PASSWORD=1234
      - MARIADB_PORT=3306
      - MARIADB_NAME=db_metro
      - MARIADB_URL=mysql+pymysql://root:1234@mariadb:3306/db_metro
      - MARIADB_DRIVER=/workspace/mariadb-java-client-3.5.7.jar
      - SPARK_URL=spark://spark-master:7077
      - HOST_IP=backend
      - JDBC_URL=jdbc:mariadb://mariadb:3306/db_metro?sessionVariables=sql_mode='ANSI_QUOTES'
      - FILE_DIR=/workspace/data/raw
      - HADOOP_PATH=/workspace
      - REACT_URL=http://aiedu.tplinkdns.com:7230
    networks:
      - spark-network
    command: ["uv", "run", "fastapi", "run", "--proxy-headers", "--forwarded-allow-ips", "'*'"]

  mariadb:
    container_name: mariadb
    image: mariadb:12.1.2
    restart: always
    command: 
      - --local-infile=1
    ports:
      - 23306:3306
    networks:
      - spark-network
    volumes:
      - ./mariadb/conf.d:/etc/mysql/conf.d:ro
      - data-mariadb:/var/lib/mysql:rw
    environment:
      - MARIADB_ROOT_PASSWORD=1234
      - MARIADB_DATABASE=db_metro
      - TZ=Asia/Seoul
      - LC_ALL=en_US.UTF-8

  spark-master:
    image: my-spark:latest
    container_name: spark-master
    user: root
    environment:
      # - SPARK_MODE=master
      # - SPARK_MASTER_PORT=7077
      # - SPARK_MASTER_HOST=0.0.0.0
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    networks:
      - spark-network
    command: start-master.sh

  spark-worker-1:
    image: my-spark:latest
    container_name: spark-worker-1
    user: root
    environment:
      #- SPARK_MODE=worker
      #- SPARK_MASTER_URL=spark://spark-master:7077
      # - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    volumes:
      - spark_spark-work-1:/opt/spark/work
    depends_on:
      - spark-master
    networks:
      - spark-network
    command: start-worker.sh spark://spark-master:7077

  spark-worker-2:
    # image: apache/spark:4.1.1-java21-python3
    image: my-spark:latest
    container_name: spark-worker-2
    user: root
    environment:
      # - SPARK_MODE=worker
      # - SPARK_MASTER_URL=spark://spark-master:7077
      # - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    volumes:
      - spark_spark-work-2:/opt/spark/work
    depends_on:
      - spark-master
    networks:
      - spark-network
    command: start-worker.sh spark://spark-master:7077

networks:
  spark-network:
    driver: bridge

volumes:
  spark_spark-work-1:
    external: true
  spark_spark-work-2:
    external: true
  data-mariadb:
    external: true # 기존 Volume 사용 옵션